name: SafeGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Soroban Contract Tests ────────────────────────────────────────────────
  contract-test:
    name: Soroban Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run contract unit tests
        run: cargo test --verbose
        working-directory: .

      - name: Build contract WASM (release)
        run: |
          cargo install stellar-cli --locked || true
          stellar contract build
        working-directory: .

  # ─── Frontend Type-check & Lint ────────────────────────────────────────────
  frontend-check:
    name: Frontend Type-Check & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type-check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint

  # ─── Frontend Build Verification ───────────────────────────────────────────
  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    needs: frontend-check

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_CONTRACT_ID || 'CD_PLACEHOLDER' }}
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_STELLAR_RPC: https://soroban-testnet.stellar.org:443

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build
