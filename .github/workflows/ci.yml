name: SafeGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Soroban Contract Tests ────────────────────────────────────────────────
  contract-test:
    name: Soroban Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run contract unit tests
        run: cargo test --verbose

      - name: Build contract WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release

  # ─── Frontend Type-check & Lint ────────────────────────────────────────────
  frontend-check:
    name: Frontend Type-Check & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type-check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint

  # ─── Frontend Build Verification ───────────────────────────────────────────
  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    needs: frontend-check

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_CONTRACT_ID || 'CD_PLACEHOLDER' }}
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_STELLAR_RPC: https://soroban-testnet.stellar.org:443

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build

  # ─── Continuous Deployment (CD) ────────────────────────────────────────────
  deploy:
    name: Deploy to Testnet & Vercel
    runs-on: ubuntu-latest
    needs: [contract-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. Build WASM ──────────────────────────────────────────────────────
      - name: Install Rust + wasm32 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo (deploy job)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build contract WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release

      # ── 2. Install Stellar CLI v27 via .deb (fast, no compilation needed) ─
      - name: Install Stellar CLI v27
        run: |
          curl -fsSL \
            https://github.com/stellar/stellar-cli/releases/download/v27.0.0/stellar-cli_27.0.0_amd64.deb \
            -o stellar-cli.deb
          sudo dpkg -i stellar-cli.deb
          stellar --version

      # ── 3. Generate & fund a fresh deployer identity (no secrets needed) ──
      - name: Create & fund deployer identity
        run: |
          stellar keys generate deployer --network testnet --fund
          echo "✅ Deployer: $(stellar keys address deployer)"

      # ── 4. Deploy Smart Contract to Stellar Testnet ───────────────────────
      - name: Deploy Smart Contract to Stellar Testnet
        id: deploy_contract
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/safeguard.wasm \
            --source deployer \
            --network testnet 2>&1 | tail -1)
          echo "CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_ENV
          echo "contract_id=$CONTRACT_ID" >> $GITHUB_OUTPUT
          echo "✅ Contract deployed: $CONTRACT_ID"

      # ── 5. Frontend: deploy to Vercel if token is available ───────────────
      - name: Deploy frontend to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "ℹ️  VERCEL_TOKEN not configured — skipping Vercel deploy."
            echo "    Frontend is live at: https://frontend-beige-psi-64.vercel.app"
          else
            npm install --global vercel@latest
            cd frontend
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
            vercel build --prod --token="$VERCEL_TOKEN"
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          fi

      # ── 6. Job Summary ────────────────────────────────────────────────────
      - name: Write deployment summary
        if: always()
        run: |
          {
            echo "## 🚀 SafeGuard Deployment Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Network | Stellar Testnet |"
            echo "| Contract ID | \`${CONTRACT_ID:-not deployed}\` |"
            echo "| Frontend | https://frontend-beige-psi-64.vercel.app |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Triggered by | ${{ github.actor }} |"
          } >> $GITHUB_STEP_SUMMARY
