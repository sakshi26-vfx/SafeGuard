name: SafeGuard CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Soroban Contract Tests ────────────────────────────────────────────────
  contract-test:
    name: Soroban Contract Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run contract unit tests
        run: cargo test --verbose
        working-directory: .

      - name: Build contract WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release
        working-directory: .

  # ─── Frontend Type-check & Lint ────────────────────────────────────────────
  frontend-check:
    name: Frontend Type-Check & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type-check
        run: npx tsc --noEmit

      - name: Run ESLint
        run: npm run lint

  # ─── Frontend Build Verification ───────────────────────────────────────────
  frontend-build:
    name: Frontend Production Build
    runs-on: ubuntu-latest
    needs: frontend-check

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_PUBLIC_CONTRACT_ID: ${{ secrets.NEXT_PUBLIC_CONTRACT_ID || 'CD_PLACEHOLDER' }}
      NEXT_PUBLIC_STELLAR_NETWORK: testnet
      NEXT_PUBLIC_STELLAR_RPC: https://soroban-testnet.stellar.org:443

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build

  # ─── Continuous Deployment (CD) ────────────────────────────────────────────
  deploy:
    name: Deploy to Testnet & Vercel
    runs-on: ubuntu-latest
    needs: [contract-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Build Contract WASM
      - name: Install Rust stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build contract WASM (release)
        run: cargo build --target wasm32-unknown-unknown --release

      # Smart Contract Deployment
      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh
          echo "$HOME/.stellar/bin" >> $GITHUB_PATH

      - name: Setup Node.js for key generation
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate & fund deployer keypair
        run: |
          npm install --no-save @stellar/stellar-sdk 2>/dev/null
          node << 'EOF'
          const { Keypair } = require('@stellar/stellar-sdk');
          const fs = require('fs');
          const kp = Keypair.random();
          const pub = kp.publicKey();
          const sec = kp.secret();
          fs.appendFileSync(process.env.GITHUB_ENV, `DEPLOYER_PUBLIC=${pub}\nDEPLOYER_SECRET=${sec}\n`);
          console.log(`Generated deployer: ${pub}`);
          EOF
          echo "Funding via Friendbot..."
          curl -sf "https://friendbot.stellar.org/?addr=$DEPLOYER_PUBLIC" -o /tmp/fb.json && \
            echo "✅ Account funded successfully" || \
            echo "⚠️ Friendbot call failed (may already be funded)"


      - name: Deploy Smart Contract to Stellar Testnet
        run: |
          stellar network add \
            --rpc-url "https://soroban-testnet.stellar.org:443" \
            --network-passphrase "Test SDF Network ; September 2015" \
            testnet
          mkdir -p ~/.config/soroban/identity ~/.config/stellar/identity
          echo "secret_key = \"$DEPLOYER_SECRET\"" > ~/.config/soroban/identity/deployer.toml
          echo "secret_key = \"$DEPLOYER_SECRET\"" > ~/.config/stellar/identity/deployer.toml
          stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/safeguard.wasm \
            --source deployer \
            --network testnet

      # Frontend Deployment via Vercel (uses stored VERCEL_TOKEN secret if configured)
      - name: Deploy to Vercel (if token available)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "⚠️ VERCEL_TOKEN not set — frontend already live at https://frontend-beige-psi-64.vercel.app"
          else
            npm install --global vercel@latest
            cd frontend
            vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
            vercel build --prod --token="$VERCEL_TOKEN"
            vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
          fi

